function dataUrlBytes(url){const b=atob(url.split(",")[1]),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}
function ascii(s){return new TextEncoder().encode(s)}function joinBytes(parts){const len=parts.reduce((n,p)=>n+p.length,0),out=new Uint8Array(len);let o=0;for(const p of parts){out.set(p,o);o+=p.length}return out}
function pdfFromCanvases(pages){const objs={},refs=[];let next=3;pages.forEach((pg,i)=>{const po=next++,co=next++,io=next++;refs.push(po);const jpg=dataUrlBytes(pg.canvas.toDataURL("image/jpeg",.92)),name=`Im${i+1}`,stream=`q\n${pg.pageW} 0 0 ${pg.pageH} 0 0 cm\n/${name} Do\nQ\n`;objs[po]=ascii(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pg.pageW} ${pg.pageH}] /Resources << /XObject << /${name} ${io} 0 R >> >> /Contents ${co} 0 R >>`);objs[co]=joinBytes([ascii(`<< /Length ${ascii(stream).length} >>\nstream\n`),ascii(stream),ascii("endstream")]);objs[io]=joinBytes([ascii(`<< /Type /XObject /Subtype /Image /Width ${pg.canvas.width} /Height ${pg.canvas.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpg.length} >>\nstream\n`),jpg,ascii("\nendstream")])});objs[1]=ascii("<< /Type /Catalog /Pages 2 0 R >>");objs[2]=ascii(`<< /Type /Pages /Kids [${refs.map(n=>`${n} 0 R`).join(" ")}] /Count ${refs.length} >>`);const count=next,head=joinBytes([ascii("%PDF-1.4\n%"),new Uint8Array([255,255,255,255]),ascii("\n")]);let parts=[head],offs=[0],pos=head.length;for(let n=1;n<count;n++){offs[n]=pos;const q=joinBytes([ascii(`${n} 0 obj\n`),objs[n],ascii("\nendobj\n")]);parts.push(q);pos+=q.length}const xp=pos;let xr=`xref\n0 ${count}\n0000000000 65535 f \n`;for(let n=1;n<count;n++)xr+=`${String(offs[n]).padStart(10,"0")} 00000 n \n`;xr+=`trailer\n<< /Size ${count} /Root 1 0 R >>\nstartxref\n${xp}\n%%EOF`;parts.push(ascii(xr));return joinBytes(parts)}
async function sharePdf(pages,filename,title,btn){const old=btn?.textContent;if(btn)btn.textContent="Making PDF…";try{const bytes=pdfFromCanvases(pages),blob=new Blob([bytes],{type:"application/pdf"}),file=new File([blob],filename,{type:"application/pdf"});if(navigator.share&&navigator.canShare?.({files:[file]}))await navigator.share({title,text:"Team Jersey bracket update",files:[file]});else{const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),5000);toast("PDF downloaded")}}catch(e){if(e.name!=="AbortError"){console.error(e);toast("Could not create PDF")}}finally{if(btn)btn.textContent=old}}
function shareAllPdf(btn){sharePdf([todayCanvas(),...ORDER.map(k=>bracketCanvas(k))],"team-jersey-all-brackets.pdf","Team Jersey Brackets",btn)}
function shareDivisionPdf(k,mode,btn){const p=mode==="challenge"?challenge.picks[k]:state.picks[k],o=mode==="challenge"?challenge.overrides[k]:state.overrides[k];sharePdf([bracketCanvas(k,p,o,mode==="challenge"?`${challenge.name||"Prediction"} Picks`:"Official Bracket")],`team-jersey-${k}-${mode}.pdf`,DIVISIONS[k].name,btn)}
function blankChallenge(){const picks={},overrides={};ORDER.forEach(k=>{picks[k]={};overrides[k]={}});return {name:"",picks,overrides}}
function loadChallenge(){try{return normalizeChallenge(JSON.parse(localStorage.getItem(CHALLENGE_KEY)))}catch(e){return blankChallenge()}}
function normalizeChallenge(c){const b=blankChallenge();b.name=c?.name||"";ORDER.forEach(k=>{b.picks[k]=c?.picks?.[k]||{};b.overrides[k]=c?.overrides?.[k]||{}});return b}
let challenge=loadChallenge();function saveChallenge(){try{localStorage.setItem(CHALLENGE_KEY,JSON.stringify(challenge))}catch(e){}}
function challengeSetWinner(k,n,team){const div=DIVISIONS[k],ps=participants(div,n,challenge.picks[k],challenge.overrides[k]);if(!ps.includes(team))return;challenge.picks[k][n]=team;cleanupBundle(div,challenge.picks[k],challenge.overrides[k]);saveChallenge()}
function renderChallenge(){main.innerHTML=`<section class="hero"><div class="eyebrow">For Fun</div><h1>Tournament Challenge</h1><p class="muted">This is intentionally simple for now. Choose a division, fill out the coded bracket, and share its PDF.</p></section><section class="section-card"><div class="form-row"><div><label for="challengeName">Your Name</label><input id="challengeName" value="${esc(challenge.name)}" placeholder="Your name"></div><div><label>Prediction Brackets</label><p class="muted">Saved only on this device.</p></div></div><div class="challenge-list">${ORDER.map(k=>`<button class="challenge-choice" data-challenge="${k}">${esc(DIVISIONS[k].name)} →</button>`).join("")}</div></section>`}
function renderRoute(){const r=route();document.querySelectorAll(".drawer-link").forEach(b=>b.classList.toggle("active",b.dataset.route===r));if(r==="today")renderToday();else if(r==="challenge")renderChallenge();else if(DIVISIONS[r])renderBracket(r,"official");else go("today");window.scrollTo(0,0)}
function renderAdmin(){document.getElementById("adminBody").innerHTML=`<p class="muted">Download the exact state on this device as a fresh hosting file, or clear everything.</p><div class="choice-grid"><button class="primary" data-download-site>Download Updated index.html</button><button class="secondary" data-clear-all>Clear All Official Results</button></div>`}
function downloadSite(){const doc=document.documentElement.cloneNode(true);doc.classList.remove("old-people");doc.querySelectorAll("dialog").forEach(d=>d.removeAttribute("open"));const published={...clone(state),publishVersion:Date.now(),updated:`Published ${new Date().toLocaleString()}`},payload=doc.querySelector("#embeddedState");if(payload)payload.textContent=JSON.stringify(published).replace(/</g,"\\u003c");const html="<!DOCTYPE html>\n"+doc.outerHTML;const blob=new Blob([html],{type:"text/html"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="index.html";a.click();setTimeout(()=>URL.revokeObjectURL(a.href),5000);toast("Updated index.html downloaded")}
function animateHeader(){const el=document.getElementById("on3Text");if(matchMedia("(prefers-reduced-motion: reduce)").matches)return;el.textContent="OOOOOOONNNNNNN…";el.classList.add("animate");setTimeout(()=>{el.textContent="THREEEEEEEE!"},750);setTimeout(()=>{el.classList.remove("animate");el.textContent="ON 3"},1700)}
document.getElementById("menuButton").addEventListener("click",openMenu);document.getElementById("closeMenu").addEventListener("click",closeMenu);backdrop.addEventListener("click",closeMenu);
document.getElementById("oldPeopleButton").addEventListener("click",()=>{document.documentElement.classList.toggle("old-people");document.getElementById("oldPeopleButton").textContent=document.documentElement.classList.contains("old-people")?"😎 Regular Size":"👓 For Old People"});
document.getElementById("brandButton").addEventListener("click",()=>{brandTaps++;clearTimeout(brandTimer);brandTimer=setTimeout(()=>brandTaps=0,1700);if(brandTaps>=5){brandTaps=0;renderAdmin();document.getElementById("adminDialog").showModal()}});
document.querySelectorAll("[data-close-dialog]").forEach(b=>b.addEventListener("click",()=>document.getElementById(b.dataset.closeDialog).close()));window.addEventListener("hashchange",renderRoute);window.addEventListener("keydown",e=>{if(e.key==="Escape")closeMenu()});
document.addEventListener("input",e=>{if(e.target.id==="challengeName"){challenge.name=e.target.value;saveChallenge()}});
document.addEventListener("click",e=>{
 const r=e.target.closest("[data-route]");if(r){if(r.dataset.closeToo)document.getElementById(r.dataset.closeToo).close();go(r.dataset.route);return}
 const d=e.target.closest("[data-day]");if(d){chooseDay(d.dataset.day);return}
 const tr=e.target.closest("[data-today-result]");if(tr){startTodayResult(tr.dataset.division,tr.dataset.todayResult);return}
 const op=e.target.closest("[data-opponent]");if(op&&pendingToday){const {k,result,s}=pendingToday,p=op.dataset.opponent;pendingToday=null;document.getElementById("opponentDialog").close();commitToday(k,result,s,p);return}
 const u=e.target.closest("[data-undo]");if(u){undo(u.dataset.undo);return}
 const bp=e.target.closest("[data-bracket-pick]");if(bp){makeBracketPick(bp.dataset.bracketPick,Number(bp.dataset.game),bp.dataset.team,bp.dataset.mode);return}
 const rs=e.target.closest("[data-reset-division]");if(rs){resetDivision(rs.dataset.resetDivision,rs.dataset.mode);return}
 if(e.target.closest("[data-share-link]")){shareLink();return}
 const ap=e.target.closest("[data-share-all-pdf]");if(ap){shareAllPdf(ap);return}
 const dp=e.target.closest("[data-share-division-pdf]");if(dp){shareDivisionPdf(dp.dataset.shareDivisionPdf,dp.dataset.mode,dp);return}
 const ch=e.target.closest("[data-challenge]");if(ch){renderBracket(ch.dataset.challenge,"challenge");return}
 if(e.target.closest("[data-download-site]")){downloadSite();return}
 if(e.target.closest("[data-clear-all]")){if(confirm("Clear every official result?")){state=blankState();saveState();todayActive.clear();document.getElementById("adminDialog").close();renderRoute()}return}
});
animateHeader();renderRoute();
</script>
